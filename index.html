<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Apple Addition Story</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="game-wrapper">

  <h1 class="title">Swaransh's Arithmatic Machine</h1>

  <button id="startStoryBtn" class="start-btn">
    ▶ Start Story
  </button>
  <!-- STORY SECTION -->
  <div class="story-box">
    <div class="mom">👩 Mom</div>
    <div class="conversation" id="conversation">
      👦 Kid: Mom, can I have some apples please?
    </div>
  </div>

  <div class="container">

    <!-- LEFT SIDE BUCKET -->
    <div class="left-panel">
      <div class="mode-toggle">
        <button id="addMode" class="mode-btn active">Addition</button>
        <button id="subMode" class="mode-btn">Subtraction</button>
    </div>
      <button class="reset-btn" id="resetBtn">Reset</button>
    </div>

    <!-- RIGHT SIDE MACHINE -->
    <div class="right-panel">

      <!-- Glass 1 -->
      <div class="column">
        <div class="glass" id="glass1"></div>
        <input type="text" id="num1" placeholder="Mom enters apples" inputmode="numeric" pattern="[0-9]*" min="0" step="1" disabled>
      </div>

      <div class="symbol">+</div>

      <!-- Glass 2 -->
      <div class="column">
        <div class="glass" id="glass2"></div>
        <input type="number" id="num2" placeholder="More apples" inputmode="numeric" pattern="[0-9]*" disabled>
      </div>

      <div class="symbol">=</div>

      <!-- Result -->
      <div class="column">
        <div class="result-glass" id="resultGlass"></div>
        <div class="result-display" id="resultText">0</div>
        <button class="count-btn" id="countBtn" disabled>
          Count Apples 🍎
        </button>
      </div>

    </div>
  </div>
</div>
<!-- Kid Voice Audio Files -->
<audio id="yayThankMom" src="audio/yayThankMom.m4a" preload="auto"></audio>
<audio id="MomCanIApples" src="audio/MomCanIApples.m4a" preload="auto"></audio>
<audio id="appleCount" src="audio/appleCount.m4a" preload="auto"></audio>
<audio id="countedThem" src="audio/countedThem.m4a" preload="auto"></audio>
<script src="script.js"></script>
</body>
</html>
