<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Addition Machine</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #4e73df, #1cc88a);
  min-height: 100vh;
  color: white;
}
.container {
  display: flex;
  gap: 60px;
  align-items: center;
}

/* LEFT SIDE */
.left-panel {
  text-align: center;
}

/* Glass for A, B, Result */
.glass, .result-glass {
  width: 140px;
  height: 180px;
  border-radius: 15px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(8px);
  border: 2px solid rgba(255,255,255,0.4);
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);

  display: flex;
  flex-wrap: wrap;
  align-content: flex-start;
  padding: 6px;
}

/* Bucket should NOT use flex */
#bucket {
  width: 140px;
  height: 180px;
  border-radius: 15px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(8px);
  border: 2px solid rgba(255,255,255,0.4);
  position: relative;
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

.apple {
  width: 38px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  margin: 4px;
}

@keyframes drop {
  from { transform: translateY(-30px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

button {
  padding: 10px 18px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  margin: 5px;
}

.add-btn {
  background: #00d084;
  color: white;
}

.sub-btn {
  background: gray;
  color: white;
  cursor: not-allowed;
}

.symbol {
  font-size: 40px;
  font-weight: bold;
}

input {
  width: 60px;
  padding: 6px;
  border-radius: 6px;
  border: none;
  margin: 5px;
  text-align: center;
}

/* RIGHT SIDE */
.right-panel {
  display: flex;
  align-items: center;
  gap: 20px;
}

.result-text {
  position: absolute;
  bottom: 5px;
  width: 100%;
  text-align: center;
  font-weight: bold;
}

.column {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.result-display {
  margin-top: 8px;
  font-weight: bold;
  font-size: 18px;
  color: white;
}

.right-panel {
  display: flex;
  align-items: center;
  gap: 20px;
}

.kid-section {
  margin-top: 15px;
  text-align: center;
}

.kid-emoji {
  font-size: 60px;
}

#kidMessage {
  margin: 10px 0;
  font-weight: bold;
  min-height: 40px;
}

.count-btn {
  padding: 8px 16px;
  border-radius: 8px;
  border: none;
  background: orange;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.reset-btn {
  background: #ff4757;
  color: white;
  padding: 10px 18px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

body {
  overflow-x: hidden;
}

.game-wrapper {
  width: 1200px;
  margin: 0 auto;
  padding-top: 40px;
}

@media (max-width: 1200px) {

.game-wrapper {
  transform: scale(calc(100vw / 1200));
  transform-origin: top center;
}

}

</style>

</head>
<body>
  <div class="game-wrapper">
    <div class="container">

      <!-- LEFT SIDE -->
      <div class="left-panel">
        <h2>Bucket</h2>
        <div class="glass" id="bucket"></div>

        <button class="add-btn" onclick="startAddition()">Addition</button>
        <button class="sub-btn" disabled>Subtraction</button>
        <button class="reset-btn" onclick="resetMachine()">Reset</button>
      </div>

      <!-- RIGHT SIDE MACHINE -->
      <div class="right-panel">

        <!-- First Glass -->
        <div class="column">
          <div class="glass" id="glass1"></div>
          <input type="number" id="num1" placeholder="Enter A">
        </div>
      
        <div class="symbol">+</div>
      
        <!-- Second Glass -->
        <div class="column">
          <div class="glass" id="glass2"></div>
          <input type="number" id="num2" placeholder="Enter B">
        </div>
      
        <div class="symbol">=</div>
      
        <!-- Result Glass -->
        <div class="column">
          <div class="result-glass" id="resultGlass"></div>
          <div class="result-display" id="resultText">0</div>
          <div class="kid-section">
            <div class="kid-emoji">👦</div>
            <div id="kidMessage">Mom, please give me some apples 🍎</div>
            <button onclick="countApples()" class="count-btn">
              Count Apples 🍎
            </button>
          </div>
        </div>
      
      </div>

    </div>
  </div>
  <script>
  const bucket = document.getElementById("bucket");
  const glass1 = document.getElementById("glass1");
  const glass2 = document.getElementById("glass2");
  const resultGlass = document.getElementById("resultGlass");
  const resultText = document.getElementById("resultText");
  const inputA = document.getElementById("num1");
  const inputB = document.getElementById("num2");
  const kidMessage = document.getElementById("kidMessage");

  // -------- BUCKET BALLS --------
  function createBucketBall() {
    const ball = document.createElement("div");
    ball.className = "bucket-ball";
    bucket.appendChild(ball);

    const maxX = bucket.clientWidth - 20;
    const maxY = bucket.clientHeight - 20;

    ball.style.left = Math.random() * maxX + "px";
    ball.style.top = Math.random() * maxY + "px";
  }

  // function fillBucket(count = 25) {
  //   bucket.innerHTML = "";
  //   for (let i = 0; i < count; i++) {
  //     createBucketBall();
  //   }
  // }

  function fillBucket(count = 20) {
    bucket.innerHTML = "";
    for (let i = 0; i < count; i++) {
      bucket.appendChild(createApple());
    }
  }

  // Create apple element
  function createApple(number = "") {
    const apple = document.createElement("div");
    apple.className = "apple";
    apple.innerText = number ? "🍎 " : "🍎";
    return apple;
  }

  function fillGlass(glass, count) {
    glass.innerHTML = "";
    for (let i = 1; i <= count; i++) {
      glass.appendChild(createApple(i));
    }
  }

  function updateKidMessage() {
    const num1 = parseInt(inputA.value) || 0;
    const num2 = parseInt(inputB.value) || 0;

    // Case 1: Only first glass filled
    if (num1 > 0 && num2 === 0) {
      kidMessage.innerHTML = 
        "🎉 Yay! I have <b>" + num1 + "</b> apples! 🍎<br>" +
        "Mom, can I have more apples please? 🥺";
    }

    // Case 2: Both glasses filled
    else if (num1 > 0 && num2 > 0) {
      kidMessage.innerHTML =
        "Wow! Now I have some more apples too! 🍎<br>" +
        "Let me count all my apples!";
    }

    // Case 3: Nothing entered
    else {
      kidMessage.innerHTML =
        "Mom, please give me some apples 🍎";
    }
  }

  // Update message when typing first number
  inputA.addEventListener("input", () => {
    const value = parseInt(inputA.value) || 0;
    fillGlass(glass1, value);
    updateKidMessage();
  });

  // Update message when typing second number
  inputB.addEventListener("input", () => {
    const value = parseInt(inputB.value) || 0;
    fillGlass(glass2, value);
    updateKidMessage();
  });

  // Count button logic
  function countApples() {
    const num1 = parseInt(inputA.value) || 0;
    const num2 = parseInt(inputB.value) || 0;
    const total = num1 + num2;

    kidMessage.innerText = "Let me count my apples...";

    resultGlass.innerHTML = "";

    setTimeout(() => {
      for (let i = 1; i <= total; i++) {
        resultGlass.appendChild(createApple(i));
      }

      resultText.innerText = total;
      kidMessage.innerText = "Wow! I have " + total + " apples! 🎉";
    }, 800);
  }


  // -------- ADDITION --------
  function startAddition() {
    const num1 = parseInt(inputA.value) || 0;
    const num2 = parseInt(inputB.value) || 0;
    const total = num1 + num2;

    resultGlass.innerHTML = "";
    for (let i = 1; i <= total; i++) {
      resultGlass.appendChild(createApple(i));
    }

    resultText.innerText = total;
  }

  function resetMachine() {
    // Clear inputs
    inputA.value = "";
    inputB.value = "";

    // Clear glasses
    glass1.innerHTML = "";
    glass2.innerHTML = "";
    resultGlass.innerHTML = "";

    // Reset result label
    resultText.innerText = "0";

    // Reset kid message
    kidMessage.innerHTML = "Mom, please give me some apples 🍎";

    // Refill bucket
    fillBucket(25);
  }

  // Run bucket on page load
  fillBucket(25);
  </script>

</body>
</html>
